<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in – Cal Filter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--white:#fff;--ink:#0c0e12;--text:#1a1d24;--muted:#8891a8;
  --line:#e2e4ea;--accent:#1a56f0;--danger:#e03131;--danger-bg:#fff5f5;
}
body{
  background:var(--bg);font-family:'Geist',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}

/* subtle grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:32px 32px;opacity:.5;pointer-events:none;
}

.card{
  position:relative;z-index:1;
  background:var(--white);border:1px solid var(--line);
  border-radius:20px;padding:2.5rem 2rem;
  width:100%;max-width:380px;
  box-shadow:0 4px 24px rgba(0,0,0,.07);
  animation:up .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,#1a56f0,#6b9fff);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin:0 auto .75rem;
}
.logo h1{font-family:'Instrument Serif',serif;font-size:1.5rem;color:var(--ink);}
.logo p{font-size:.8rem;color:var(--muted);margin-top:.2rem;}

.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem;letter-spacing:.03em;}
.field input{
  width:100%;padding:.7rem .9rem;
  background:var(--bg);border:1px solid var(--line);
  border-radius:9px;font-family:'Geist Mono',monospace;font-size:.9rem;
  color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;
  letter-spacing:.05em;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,240,.1);background:var(--white);}
.field input::placeholder{color:var(--muted);font-family:'Geist',sans-serif;letter-spacing:0;}

.error-msg{
  background:var(--danger-bg);border:1px solid #ffc9c9;
  color:var(--danger);font-size:.82rem;
  border-radius:8px;padding:.6rem .85rem;margin-bottom:1rem;
}

.btn{
  width:100%;padding:.72rem;border-radius:9px;border:none;
  background:var(--accent);color:#fff;
  font-family:'Geist',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:background .15s,transform .12s;
}
.btn:hover{background:#1448d0;transform:translateY(-1px);}
.btn:active{transform:none;}

.hint{text-align:center;margin-top:1.25rem;font-size:.75rem;color:var(--muted);}
.hint code{font-family:'Geist Mono',monospace;background:var(--bg);padding:.1rem .4rem;border-radius:4px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📅</div>
    <h1>Cal Filter</h1>
    <p>Sign in to manage your calendars</p>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" autofocus>
    </div>
    <button class="btn" type="submit">Sign in →</button>
  </form>

  <p class="hint">Set via <code>APP_PASSWORD</code> env variable</p>
</div>
</body>
</html>
